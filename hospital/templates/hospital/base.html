{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{% block title %}Sistema Hospitalar{% endblock %}</title>
<style>
    :root {
        --azul: #1d4ed8;
        --azul-escuro: #1e293b;
        --azul-claro: #3b82f6;
        --cinza-claro: #f4f4f5;
        --cinza-medio: #e5e7eb;
        --cinza-borda: #cbd5e1;
        --branco: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
        background-color: var(--cinza-claro);
        color: var(--azul-escuro);
        line-height: 1.5;
    }
    nav.menu {
        background-color: var(--azul-escuro);
        padding: 12px 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    nav.menu a {
        color: var(--branco);
        text-decoration: none;
        padding: 9px 14px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.2px;
    }
    nav.menu a:hover,
    nav.menu a.ativo {
        background-color: var(--azul);
    }
    main {
        max-width: 1200px;
        margin: 24px auto;
        padding: 0 20px 48px 20px;
    }
    .card {
        background-color: var(--branco);
        border: 1px solid var(--cinza-borda);
        border-radius: 8px;
        padding: 24px;
        margin-bottom: 24px;
        overflow-x: auto;
        box-shadow: 0 1px 3px rgba(30, 41, 59, 0.08);
    }
    .grid-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 18px;
    }
    .entity-card {
        background-color: var(--branco);
        border: 1px solid var(--cinza-borda);
        border-left: 6px solid var(--azul);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 1px 3px rgba(30, 41, 59, 0.08);
    }
    .entity-card:hover {
        box-shadow: 0 4px 10px rgba(30, 41, 59, 0.14);
    }
    .entity-card h3 {
        margin: 0 0 8px 0;
        color: var(--azul);
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }
    .entity-card .total {
        font-size: 30px;
        font-weight: 700;
        color: var(--azul-escuro);
    }
    .entity-card .acoes {
        margin-top: 14px;
        display: flex;
        gap: 8px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background-color: var(--branco);
    }
    table th {
        background-color: var(--azul-escuro);
        color: var(--branco);
        text-align: left;
        padding: 11px 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        white-space: nowrap;
    }
    table td {
        padding: 10px;
        border-bottom: 1px solid var(--cinza-medio);
        font-size: 13px;
        white-space: nowrap;
    }
    table tr:nth-child(even) td {
        background-color: var(--cinza-claro);
    }
    table tr:hover td {
        background-color: var(--cinza-medio);
    }
    .btn {
        display: inline-block;
        background-color: var(--azul);
        color: var(--branco);
        border: none;
        padding: 10px 18px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: background-color 0.15s ease;
    }
    .btn:hover {
        background-color: var(--azul-escuro);
    }
    .btn-secundario {
        background-color: var(--cinza-medio);
        color: var(--azul-escuro);
    }
    .btn-secundario:hover {
        background-color: var(--cinza-borda);
    }
    .form-control, .form-select {
        width: 100%;
        padding: 9px 10px;
        border: 1px solid var(--cinza-borda);
        border-radius: 5px;
        margin-bottom: 14px;
        background-color: var(--branco);
        color: var(--azul-escuro);
        font-size: 14px;
    }
    .form-control:focus, .form-select:focus {
        outline: none;
        border-color: var(--azul);
    }
    form label {
        display: block;
        font-weight: 700;
        margin-bottom: 5px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--azul-escuro);
    }
    .mensagens {
        margin-bottom: 18px;
    }
    .mensagem {
        padding: 11px 16px;
        border-radius: 5px;
        margin-bottom: 8px;
        background-color: var(--branco);
        color: var(--azul-escuro);
        font-size: 14px;
        border-left: 4px solid var(--azul);
        border: 1px solid var(--cinza-borda);
    }
    .secao-titulo {
        color: var(--azul-escuro);
        border-bottom: 3px solid var(--azul);
        padding-bottom: 10px;
        margin-bottom: 18px;
        display: inline-block;
    }
    .barra-acoes {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 10px;
    }
    pre.sql-box {
        background-color: var(--azul-escuro);
        color: var(--cinza-claro);
        padding: 18px;
        border-radius: 6px;
        font-size: 13px;
        overflow-x: auto;
        white-space: pre-wrap;
        line-height: 1.6;
    }
    .equipe-lista {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .equipe-lista li {
        padding: 12px 16px;
        border: 1px solid var(--cinza-borda);
        border-left: 5px solid var(--azul);
        border-radius: 6px;
        margin-bottom: 10px;
        background-color: var(--cinza-claro);
        font-size: 14px;
    }
    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .info-bloco {
        background-color: var(--cinza-claro);
        border: 1px solid var(--cinza-borda);
        border-radius: 6px;
        padding: 16px;
    }
    .info-bloco h4 {
        margin: 0 0 6px 0;
        color: var(--azul);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
</style>
</head>
<body>

<nav class="menu">
    <a href="{% url 'dashboard_diretor' %}" {% if request.resolver_match.url_name == 'dashboard_diretor' or request.resolver_match.url_name == 'dashboard_chefe' or request.resolver_match.url_name == 'dashboard_farmaceutico' %}class="ativo"{% endif %}>Dashboard</a>
    <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="ativo"{% endif %}>Dados</a>
    <a href="{% url 'diagrama' %}" {% if request.resolver_match.url_name == 'diagrama' %}class="ativo"{% endif %}>Diagrama ER</a>
    <a href="{% url 'sql_view' %}" {% if request.resolver_match.url_name == 'sql_view' %}class="ativo"{% endif %}>SQL</a>
</nav>

<main>
    {% if messages %}
    <div class="mensagens">
        {% for message in messages %}
        <div class="mensagem">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
